services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: miniapp_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn -c deploy/gunicorn.conf.py config.wsgi:application"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: miniapp_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,web
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8001}
    ports:
      - "8001:8000"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  media_data:
