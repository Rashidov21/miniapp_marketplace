# Example Nginx site for Telegram Mini App (HTTPS required for production WebApp).
# Replace server_name and SSL paths; proxy to Gunicorn on 127.0.0.1:8000.

upstream miniapp_gunicorn {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name your-domain.example;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.example;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml text/xml;

    client_max_body_size 8M;

    # Django collectstatic with ManifestStaticFilesStorage → hashed names (e.g. app.abc12.js).
    # Long cache + immutable is safe: each deploy changes URLs in HTML; old hashed files can 404 harmlessly.
    location /static/ {
        alias /var/www/miniapp_marketplace/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/miniapp_marketplace/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://miniapp_gunicorn;
    }
}
