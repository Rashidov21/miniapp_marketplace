{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Bosh sahifa" %}{% endblock %}
{% block content %}
<section class="space-y-6">
  <h1 class="text-2xl font-bold text-slate-900">{% trans "Mini do‘kon" %}</h1>
  <p class="text-slate-600">{% trans "Telegram ichida oddiy sotuv." %}</p>
  <div id="status" class="rounded-xl bg-white p-4 shadow-sm ring-1 ring-slate-200 text-sm text-slate-600">{% trans "Yuklanmoqda…" %}</div>
  <div class="flex flex-col gap-3">
    <a id="seller-link" href="/webapp/seller/" class="touch-target flex items-center justify-center rounded-xl bg-brand px-4 py-3 font-semibold text-white shadow hover:bg-brand-dark">
      {% trans "Sotuvchi kabineti" %}
    </a>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
  MiniApp.ready();
  (async function () {
    const el = document.getElementById("status");
    const init = MiniApp.getInitData();
    if (!init) {
      el.textContent = "{% trans 'Telegram ichida oching (initData yo‘q).' %}";
      return;
    }
    try {
      const sp = MiniApp.getStartParam();
      if (sp && sp.indexOf("shop_") === 0) {
        const id = sp.replace("shop_", "");
        if (id) {
          window.location.replace("/webapp/shop/" + id + "/");
          return;
        }
      }
      await MiniApp.apiFetch("/auth/telegram/", { method: "POST", body: JSON.stringify({ init_data: init }) });
      const me = await MiniApp.apiFetch("/me/", { method: "GET" });
      el.textContent = "{% trans 'Xush kelibsiz,' %} " + (me.first_name || me.username || me.telegram_id);
    } catch (e) {
      el.textContent = "{% trans 'Autentifikatsiya xatosi.' %}";
    }
  })();
</script>
{% endblock %}
