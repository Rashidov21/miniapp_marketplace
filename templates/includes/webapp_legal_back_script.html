{% load i18n %}
<script>
  MiniApp.ready();
  (function () {
    var b = document.getElementById("back-btn");
    if (!b) return;
    b.addEventListener("click", function (e) {
      e.preventDefault();
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "/webapp/discover/";
      }
    });
  })();
</script>
